<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D to 3D Cube Transformation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            perspective: 1000px; /* Gives 3D depth */
        }

        .scene {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateAndElongate 10s infinite linear;
        }

        .square {
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: rgba(0, 128, 255, 0.5);
            border: 2px solid #000;
        }

        /* Cube faces */
        .cube {
            position: absolute;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: rgba(0, 128, 255, 0.5);
            border: 1px solid #000;
        }

        .front  { transform: translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .top    { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }

        /* Animation keyframes */
        @keyframes rotateAndElongate {
            0% {
                transform: rotateY(0deg) scaleZ(0); /* Start as 2D square */
            }
            20% {
                transform: rotateY(0deg) scaleZ(1); /* Expand to 3D cube */
            }
            60% {
                transform: rotateY(360deg) scaleZ(1); /* Rotate as cube */
            }
            80% {
                transform: rotateY(540deg) scaleZ(2); /* Elongate */
            }
            100% {
                transform: rotateY(720deg) scaleZ(2); /* Finish elongated */
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face left"></div>
            <div class="face right"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>
</body>
</html>
