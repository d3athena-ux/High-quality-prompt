<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle System</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            overflow: hidden; 
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Glowing sphere at the center
        const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
        const sphereMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            emissive: 0xaaaaaa,
            transparent: true,
            opacity: 0.8
        });
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(sphere);

        // Add a point light for glow effect
        const pointLight = new THREE.PointLight(0xffffff, 1, 100);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        // Particle system
        const particleCount = 1000;
        const particles = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorGradient = [
            new THREE.Color("#ff00ff"), // Purple
            new THREE.Color("#ff69b4"), // Pink
            new THREE.Color("#00b7eb"), // Blue
            new THREE.Color("#ffff00")  // Yellow
        ];

        for (let i = 0; i < particleCount; i++) {
            // Spherical distribution
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const radius = 5 + Math.random() * 2;

            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);

            // Random color from gradient
            const color = colorGradient[Math.floor(Math.random() * colorGradient.length)];
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }

        particles.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        particles.setAttribute("color", new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });

        const particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);

        // Orbital trails
        const trailCount = 5;
        const trails = [];
        for (let i = 0; i < trailCount; i++) {
            const trailGeometry = new THREE.BufferGeometry();
            const trailPositions = new Float32Array(100 * 3);
            const radius = 3 + i * 0.5;
            for (let j = 0; j < 100; j++) {
                const angle = (j / 100) * Math.PI * 2;
                trailPositions[j * 3] = radius * Math.cos(angle);
                trailPositions[j * 3 + 1] = radius * Math.sin(angle) * Math.sin(i);
                trailPositions[j * 3 + 2] = radius * Math.sin(angle) * Math.cos(i);
            }
            trailGeometry.setAttribute("position", new THREE.BufferAttribute(trailPositions, 3));
            const trailMaterial = new THREE.LineBasicMaterial({ color: colorGradient[i % colorGradient.length] });
            const trail = new THREE.Line(trailGeometry, trailMaterial);
            scene.add(trail);
            trails.push(trail);
        }

        // Camera position
        camera.position.z = 15;

        // Animation
        function animate() {
            requestAnimationFrame(animate);

            // Rotate particle system
            particleSystem.rotation.y += 0.005;

            // Rotate trails at different speeds and angles
            trails.forEach((trail, index) => {
                trail.rotation.x += 0.01 * (index + 1) * 0.5;
                trail.rotation.z += 0.005 * (index + 1);
            });

            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
